seed: 1
device: cpu
dtype: float32
state_dtype: complex64
data:
  family: grid
  N: 64
  seed: 1234
  directed: false
  grid:
    Lx: 8
    Ly: 8
    boundary: open
    mark_scheme: single
    marks_per_episode: 1
  regular:
    d: 3
  er:
    p: 0.05
  ws:
    Lx: 8
    Ly: 8
    kx: 1
    ky: 1
    beta: 0.2
    torus: false
  train_sizes:
    mode: fixed_list
    fixed_list:
    - 32
    - 48
    - 64
    - 80
  val_sizes:
    mode: fixed_list
    fixed_list:
    - 40
    - 72
  test_iid_sizes:
    mode: fixed_list
    fixed_list:
    - 48
    - 64
  test_ood_sizes:
    mode: fixed_list
    fixed_list:
    - 96
  batching:
    episodes_per_graph: 1
    graphs_per_batch_train: 2
    graphs_per_batch_eval: 1
    shuffle_train: true
  manifests:
    enabled: true
    root_dir: acpl/data/manifests
    val_manifest: search-grid-val.json
    test_iid_manifest: search-grid-test-iid.json
    test_ood_manifest: search-grid-test-ood.json
    episodes:
      val: 120
      test_iid: 120
      test_ood: 150
    build:
      seed: 1337
      episode_seed_base: 930000
      horizon_policy: per_horizon_manifest
      per_horizon:
        enabled: true
        horizons:
        - 96
        - 128
        - 160
        - 192
features:
  use_degree: true
  degree_onehot_K: 16
  degree_log1p: false
  degree_norm: inv_sqrt
  use_coords: true
  coords_normalize: true
  use_indicator: false
  use_lap_pe: true
  lap_pe_k: 16
  lap_pe_norm: sym
  lap_pe_random_sign: true
  use_rwse: true
  rwse_K: 16
  rwse_aggregation: diag
  use_role_encodings: true
  role_degree_bins_K: 8
  role_include_leaf: true
  role_include_hub: true
  role_hub_percentile: 0.9
  role_include_grid_boundary: true
  use_bitstrings: false
  build_arcs: false
  eps: 1.0e-12
  seed: 42
  include_degree: true
  coords:
    enabled: true
    normalize: true
  laplacian_pe:
    enabled: true
    k: 16
    sign_fix: max-abs-positive
sim:
  steps: 64
  horizon_selection:
    enabled: true
    T_rule: c*sqrt(|V|)
    candidates:
    - 96
    - 128
    - 160
    - 192
    choose_on_val: true
    criterion_metric: eval/target/success
    tie_break: smaller_T
  rollout:
    check_unitarity: false
    check_simplex_every: 0
task:
  name: search
  target_index: 63
  target_radius: 0
  init_state: node0
  use_indicator: false
  objective: maximize P_Omega(T)
  normalized_time_feature: true
  grid:
    boundary: open
    mark_scheme: single
    k: 1
  loss:
    kind: neg_success
    clamp_min_p: 1.0e-12
    reduction: mean
loss:
  kind: nll
  reduction: mean
  normalize_prob: true
  eps: 1.0e-08
  margin: 0.0
  cvar_alpha: 0.1
  mix_kind: tv
  mix_eps: 1.0e-12
model:
  gnn:
    kind: pna
    hidden: 64
    out: 64
    dropout: 0.1
    layers: 3
    hidden_dim: 128
    norm: graphnorm
    residual: true
    aggregators:
    - sum
    - mean
    - max
    - std
    scalers:
    - identity
    - amplification
    - attenuation
  controller:
    kind: gru
    hidden: 64
    layers: 1
    dropout: 0.1
    bidirectional: false
    hidden_dim: 128
    time_pe_dim: 32
    normalized_time_feature: true
  head:
    hidden: 0
    dropout: 0.0
    layernorm: true
  time_pe_dim: 32
  time_pe_learned_scale: true
  coin:
    family: cayley
    generators: full
    theta_scale: 1.0
    theta_noise_std: 0.0
coin:
  family: exp
  theta_scale: 1.0
  theta_noise_std: 0.0
  auto_fix_notes:
    reason: su2 invalid for max-degree>2 graphs; auto-switched
    from: su2
    to: exp
    graph_family: grid
optim:
  name: adamw
  lr: 0.00025
  weight_decay: 1.0e-05
  betas:
  - 0.9
  - 0.999
  grad_clip:
    enabled: true
    mode: norm
    max_norm: 1.0
  precision:
    amp: true
  scheduler:
    kind: cosine_warmup
    cosine_warmup:
      warmup_steps: 500
      t_max: 16000
      eta_min: 1.0e-05
  eps: 1.0e-08
  regularizers:
    temporal_smoothness: 0.001
    magnitude: 1.0e-05
    spectral:
      enabled: true
      dct_weight: 5.0e-05
      hf_bins: 0.25
train:
  epochs: 120
  batch_size: 1
  episodes_per_epoch: 200
  verify_checkpoints: true
  ci_n_seeds: 5
  ci_episodes: 100
  run_dir: runs/search-grid/seed1
log:
  backend: console
  interval: 50
  ci_bootstrap_samples: 1000
  ci_alpha: 0.05
  wandb:
    enabled: false
    project: acpl-qwalk
    run_name: A6_line64_T64_gcn_gru_su2
compile:
  enabled: false
  backend: aot_eager
  force_inductor: false
experiment:
  name: search-grid
  goal: marked-node search on 2D grids
  description: "Pre-registered evaluation of ACPL for marked-node search on 2D grids.\
    \ We maximize the probability mass on a marked set \u03A9 (default single mark),\
    \ and compare against analytical and algorithmic baselines.\n"
  tags:
  - search
  - grid-2d
  - ood
  - ablations
  - baselines
  - ci
  - embeddings
  notes: 'We report success curves and terminal success at the marked set. Primary
    selection (if enabled) chooses horizon T on validation, but we also report full
    performance across candidate horizons.

    '
defaults:
  task_config: acpl/configs/task/search.yaml
  optim_config: acpl/configs/optim.yaml
repro:
  master_seed: 1234
  train_seeds:
  - 0
  - 1
  - 2
  eval_seeds:
  - 101
  - 102
  - 103
  - 201
  - 202
  deterministic_torch: true
  cublas_workspace_config: :4096:8
  pythonhashseed: 0
  save_git_info: true
  save_resolved_config: true
training:
  method: backprop
  epochs: 160
  steps_per_epoch: 400
  accum_steps: 1
  amp: true
  device: cuda
  log_every: 50
  log_grad_norm_every: 200
  ckpt:
    dir: checkpoints/search-grid
    keep_last: 6
    save_every_steps: 2000
    save_best_metric: eval/target/success
comparisons:
  baselines:
  - name: analytical_akr
    enabled: true
    description: "Ambainis\u2013Kempe\u2013Rivosh (AKR) grid search reference (if\
      \ implemented)."
  - name: fixed_grover_d4
    enabled: true
    description: Fixed Grover diffusion coin for degree-4 grids.
  - name: global_time_coin
    enabled: true
    description: "\u03B8(t) learned but shared across nodes."
  - name: fixed_random_unitary_d4
    enabled: true
    description: Seeded random fixed U(4) coin baseline.
  ablations:
  - name: no_coords
    enabled: true
    description: Disable coordinate features.
  - name: no_lappe
    enabled: true
    description: Disable Laplacian PE.
  - name: globalcoin
    enabled: true
    description: "Force \u03B8(v,t)=\u03B8(t) (no node adaptivity)."
  - name: timefrozen
    enabled: true
    description: "Force \u03B8(v,t)=\u03B8(v) (no time adaptivity)."
eval:
  enabled: true
  ci:
    alpha: 0.1
    n_eval_seeds: 5
    episodes_per_seed:
      val: 80
      test_iid: 80
      test_ood: 100
    method: bootstrap
    bootstrap:
      n_resamples: 2000
      block_by: episode
  metrics:
  - target/success
  - target/maxp
  - mix/tv
  - mix/js
  - mix/H
  - mix/kl_pu
  artifacts:
    write_dir: eval
    write_ci: true
    write_per_seed: true
    write_tables: true
    write_json: true
    stats:
      enabled: true
      quantiles:
      - 0.05
      - 0.25
      - 0.5
      - 0.75
      - 0.95
      include_probability_checks: true
      include_time_series: true
    embeddings:
      enabled: true
      source: gnn
      aggregate_time: last
      max_nodes_for_plot: 1024
      pca:
        enabled: true
        n_components: 2
      color_by:
      - coord_x
      - coord_y
      - degree
      save:
        raw_pt: true
        raw_csv: true
        pca_csv: true
        pca_png: true
        stats_json: true
    plots:
      enabled: true
      success_curve: true
      tv_curve: true
      theta_spectra: true
success_criteria:
  improvement_over_best_baseline:
    metric: target/success
    split: test_ood
    min_abs_improvement: 0.03
compute:
  device: auto
  dtype:
    encoder: float32
    state: complex128
  amp: true
  wallclock_hours: 16
  max_memory_gb: 24
  track_throughput: true
